<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vintage Flip Countdown</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0d1117;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
    padding:30px;
}

h1{
    margin-bottom:40px;
    font-size:42px;
}

.counter{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.unit{
    text-align:center;
}

.flip{
    width:150px;
    height:120px;
    line-height:120px;
    font-size:55px;
    font-weight:bold;
    background:#1f2937;
    border-radius:15px;
    border:2px solid #444;
    position:relative;
    overflow:hidden;

    box-shadow:
        inset 0 2px 8px rgba(255,255,255,.08),
        inset 0 -2px 8px rgba(0,0,0,.5),
        0 12px 30px rgba(0,0,0,.4);
}

.flip::before{
    content:"";
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    height:2px;
    background:#000;
    opacity:.35;
}

.flip.animate{
    animation:flip .6s ease;
}

@keyframes flip{

0%{
    transform:perspective(600px) rotateX(0deg);
}

50%{
    transform:perspective(600px) rotateX(-90deg);
}

100%{
    transform:perspective(600px) rotateX(0deg);
}

}

.label{
    margin-top:15px;
    font-size:18px;
    color:#b8b8b8;
    letter-spacing:2px;
}

.footer{
    margin-top:40px;
    font-size:18px;
    color:#d1d5db;
}

@media(max-width:768px){

.flip{
    width:110px;
    height:90px;
    line-height:90px;
    font-size:40px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>⏳ Countdown Timer</h1>

<div class="counter">

<div class="unit">
<div class="flip" id="days">000</div>
<div class="label">Days</div>
</div>

<div class="unit">
<div class="flip" id="hours">00</div>
<div class="label">Hours</div>
</div>

<div class="unit">
<div class="flip" id="minutes">00</div>
<div class="label">Minutes</div>
</div>

<div class="unit">
<div class="flip" id="seconds">00</div>
<div class="label">Seconds</div>
</div>

</div>

<div class="footer">
Target Date:
<strong>31 December 2026 11:59:59 PM</strong>
</div>

</div>

<script>

// ====================================================
// CHANGE YOUR TARGET DATE HERE
// ====================================================

const targetDate = new Date("2026-08-17T23:59:59");

// ====================================================

function flip(id,value){

    const el=document.getElementById(id);

    if(el.textContent!==value){

        el.classList.remove("animate");

        void el.offsetWidth;

        el.textContent=value;

        el.classList.add("animate");
    }

}

function countdown(){

    const now=new Date();

    let diff=targetDate-now;

    if(diff<=0){

        flip("days","000");
        flip("hours","00");
        flip("minutes","00");
        flip("seconds","00");

        clearInterval(timer);

        document.querySelector("h1").innerHTML="🎉 Time's Up!";

        return;
    }

    const days=Math.floor(diff/(1000*60*60*24));

    diff%=1000*60*60*24;

    const hours=Math.floor(diff/(1000*60*60));

    diff%=1000*60*60;

    const minutes=Math.floor(diff/(1000*60));

    diff%=1000*60;

    const seconds=Math.floor(diff/1000);

    flip("days",String(days).padStart(3,"0"));
    flip("hours",String(hours).padStart(2,"0"));
    flip("minutes",String(minutes).padStart(2,"0"));
    flip("seconds",String(seconds).padStart(2,"0"));

}

countdown();

const timer=setInterval(countdown,1000);

</script>

</body>
</html>
