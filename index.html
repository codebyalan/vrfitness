<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Day Counter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0d1b2a;
    color:white;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:30px;
}

.counter{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.box{
    width:120px;
    padding:20px;
    background:#1b263b;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.number{
    font-size:42px;
    font-weight:bold;
}

.label{
    margin-top:10px;
    color:#bbb;
}

.footer{
    margin-top:30px;
    color:#ccc;
}
</style>
</head>

<body>

<div class="container">

<h1>Countdown Timer</h1>

<div class="counter">

<div class="box">
<div id="days" class="number">0</div>
<div class="label">Days</div>
</div>

<div class="box">
<div id="hours" class="number">00</div>
<div class="label">Hours</div>
</div>

<div class="box">
<div id="minutes" class="number">00</div>
<div class="label">Minutes</div>
</div>

<div class="box">
<div id="seconds" class="number">00</div>
<div class="label">Seconds</div>
</div>

</div>

<div class="footer">
Target Date: <strong>31 December 2026 23:59:59</strong>
</div>

</div>

<script>

// Change this to your future date
const targetDate = new Date("2026-08-17T23:59:59");

function updateCountdown() {
    const now = new Date();
    let diff = targetDate - now;

    // If the countdown has finished
    if (diff <= 0) {
        document.getElementById("days").textContent = "0";
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";

        clearInterval(timer);

        // Optional:
        // document.querySelector("h1").textContent = "🎉 Countdown Finished!";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    diff %= (1000 * 60 * 60 * 24);

    const hours = Math.floor(diff / (1000 * 60 * 60));
    diff %= (1000 * 60 * 60);

    const minutes = Math.floor(diff / (1000 * 60));
    diff %= (1000 * 60);

    const seconds = Math.floor(diff / 1000);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = String(hours).padStart(2, "0");
    document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
    document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
}

updateCountdown();
const timer = setInterval(updateCountdown, 1000);

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
